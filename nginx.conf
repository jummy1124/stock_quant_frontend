server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- 反向代理到後端 (同源，免 CORS) ----
    # 後端跑在 host 上的 8000 埠 (它自己的 docker compose publish 出來)。
    # frontend 容器透過 host-gateway 連回 host：見 docker-compose.yml 的 extra_hosts。
    # 改後端位址只需改這裡的 upstream，不必動前端程式碼。
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---- 反向代理到「使用者資料」後端 (stock_quant_userdata, 同源免 CORS) ----
    # 帳號 + 個股紀錄服務，預設跑在 host 的 8100 埠 (它自己的 docker compose publish 出來)。
    # 後端尚未起來時這裡會回 502，前端「我的紀錄」分頁會顯示載入失敗，無害。
    # 改後端位址只需改這裡，不必動前端程式碼。
    location /userapi/ {
        proxy_pass http://host.docker.internal:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 前端自身存活檢查 (CI/CD 部署腳本打這支判斷容器是否就緒；不依賴後端)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # config.js 與 index.html 不快取 (執行期會被覆寫 / 需取最新)
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # 帶 hash 的靜態資產長快取
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback：找不到檔案就回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
