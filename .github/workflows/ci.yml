name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # WIF 換 GCP 短期憑證需要

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 有 package-lock.json 時用 npm ci（可重現）；沒有則退回 npm install
      - run: npm ci || npm install
      # 依專案調整：有就跑，沒有就略過
      - run: npm run lint --if-present
      - run: npm run type-check --if-present
      - run: npm test --if-present
      - run: npm run build # build 一定要過，確保可部署（含 tsc 型別檢查）

  build-and-push:
    name: Build & push image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      AR_REPOSITORY: ${{ vars.AR_REPOSITORY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4
      - id: img
        run: |
          REG="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${IMAGE_NAME}"
          echo "sha_tag=${REG}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${REG}:latest" >> "$GITHUB_OUTPUT"
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.sha_tag }}
            ${{ steps.img.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
